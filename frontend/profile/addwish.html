<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add a Wish - MyWish</title>
  <link rel="stylesheet" href="../styles/style.css">
  <link rel="stylesheet" href="../login/login.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box glass">
      <h1>Make a Wish 🌟</h1>
      <p>Fill in the details for your Christmas wish.</p>
      <form id="add-wish-form">
        <div class="input-group">
          <label for="wish-title">Wish Title</label>
          <input type="text" id="wish-title" required placeholder="e.g. A New Bicycle">
        </div>
        <div class="input-group">
          <label for="wish-description">Description</label>
          <textarea id="wish-description" required placeholder="Tell us more about your wish..."></textarea>
        </div>
        <div class="input-group">
          <label for="wish-price">Price Range</label>
          <input type="text" id="wish-price" required placeholder="e.g. $50 - $100">
        </div>
        <div class="input-group">
          <label for="wish-image">Image URL (Optional)</label>
          <input type="url" id="wish-image" placeholder="https://image-url.com">
        </div>
        <div class="input-group">
          <label for="wish-date">Expected Date</label>
          <input type="date" id="wish-date">
        </div>
        <div class="input-group">
          <label for="wish-contact">Contact Info</label>
          <input type="text" id="wish-contact" placeholder="Email, Phone, or DM handle">
        </div>
        <button type="submit" class="btn-primary">Post Wish</button>
      </form>
      <a href="profile.html" class="auth-footer">Back to Profile</a>
    </div>
  </div>
  <script type="module" src="profile.js"></script>
</body>
</html>
