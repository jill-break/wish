<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Profile - MyWish</title>
  <link rel="stylesheet" href="../styles/style.css">
  <link rel="stylesheet" href="profile.css">
</head>
<body>
  <header>
    <div class="header-container">
      <h1><a href="../index.html" style="text-decoration: none; color: inherit;">MyWish <span>🎄</span></a></h1>
      <div class="header-actions">
        <a href="../index.html" class="auth-link">Home</a>
        <button id="logout-btn" class="auth-link">Logout</button>
      </div>
    </div>
  </header>

  <main>
    <div id="profile-info" class="profile-card glass">
      <!-- Loaded dynamically via profile.js -->
      <div class="skeleton-loader">Loading profile...</div>
    </div>

    <section class="user-actions">
      <a href="addwish.html" class="btn-primary">✨ Add New Wish</a>
    </section>

    <section id="my-wishes" class="my-wishes-section">
      <h3>My Wishes</h3>
      <div class="wish-cards" id="user-wishes">
        <!-- User's wishes will be loaded here -->
      </div>
    </section>
  </main>

  <script type="module" src="profile.js"></script>
  <script type="module">
    document.getElementById('logout-btn').addEventListener('click', () => {
      localStorage.removeItem('token');
      window.location.href = '../login/login.html';
    });
  </script>
</body>
</html>
