<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyWish</title>
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <header>
    <div class="header-container">
      <h1>MyWish <span>🎄</span></h1>
      <div class="header-actions">
        <!-- Display Login Button if not logged in, else display Profile Icon -->
        <a href="./login/login.html" id="login-link" class="auth-link">Login</a>
        <a href="profile.html" id="profile-link" class="profile-link" style="display: none;">
          <img src="https://via.placeholder.com/50" alt="Profile Icon" class="avatar">
        </a>
      </div>
    </div>
  </header>

  <main>
    <div class="hero-section">
      <h2>Spread the Joy this Christmas</h2>
      <p class="hero-subtitle">List your wishes or make someone's dream come true.</p>
    </div>

    <section id="wish-list">
      <div class="section-header">
        <h3>Recent Wishes</h3>
        <p>Browse through wishes and find one to grant!</p>
      </div>
      <div class="wish-cards" id="wishes">
        <!-- Wish cards will be dynamically generated by app.js -->
      </div>
    </section>
  </main>

  <footer>
    <div class="footer-content">
      <p>&copy; 2025 MyWish. Built with ❤️ for the holiday season.</p>
    </div>
  </footer>

  <script src="scripts/app.js"></script>
</body>
</html>
